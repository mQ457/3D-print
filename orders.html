<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3Д печать</title>
    <link rel="icon" type="image/png" href="image/3D print(1).png">
    <link rel="stylesheet" href="./site.css" />
  </head>
  <body>
    <div class="container">
      <div class="app-shell">
        <input type="checkbox" id="nav-toggle" style="position:absolute;left:-9999px;" />
        <label class="app-burger" for="nav-toggle" aria-label="Открыть меню">☰</label>

        <aside class="sidebar" aria-label="Меню">
          <div class="side-brand">3Д Печать</div>
          <nav class="nav">
            <a class="nav-item" href="profile.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_770.png" alt="setting"></span>
              Профиль
            </a>
            <a class="nav-item is-active" href="orders.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_776.png" alt="setting"></span>
              Мои заказы
            </a>
            <a class="nav-item" href="delivery-address.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_727.png" alt="setting"></span>
              Адрес доставки
            </a>
            <a class="nav-item" href="payment.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_794.png" alt="setting"></span>
              Оплата
            </a>
          </nav>

          <div class="side-bottom">
            <div class="side-user">
              <div>
                <div class="name"></div>
                <div class="role">клиент</div>
              </div>
            </div>
            <button id="logout-btn" class="side-exit" type="button" style="background:none;border:none;">
              <span class="exit-ic" aria-hidden="true"><img src="image/Frame_1_965.png" alt="exit"></span>
              Выход
            </button>
          </div>
        </aside>

        <div class="app-content">
          <div class="app-top">
            <div>
              <h1 class="app-title">Мои заказы</h1>
              <p class="app-sub">Проверьте свои данные и новые заказы</p>
            </div>
            <div class="breadcrumb"><span class="arrow-icon"><img class="" src="image/Frame_1_748.png" alt="exit"></span><a href="landing.html">Главная</a></div>
          </div>

          <section class="card orders-card">
            <div class="orders-head">
              <h2>Мои заказы</h2>
              <p>Проверяйте статус и детали заказа</p>
            </div>

            <table class="orders-table" aria-label="Таблица заказов">
              <thead>
                <tr>
                  <th style="width:90px;">Номер</th>
                  <th>Услуга</th>
                  <th style="width:140px;">Файл</th>
                  <th style="width:170px;">Статус</th>
                  <th style="width:110px;">Дата</th>
                  <th style="width:120px;">Сумма</th>
                  <th style="width:46px;"></th>
                </tr>
              </thead>
              <tbody>
                

                
              </tbody>
            </table>
          </section>
        </div>
      </div>
    </div>
<script src="delet_landing_page.js"></script>
    <script src="scripts/app-bootstrap.js"></script>
    <script src="scripts/order-notifications.js"></script>
    <script src="scripts/orders.js"></script>
</html>
