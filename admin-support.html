<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ поддержка</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">3Д Печать</div>
      <nav class="admin-nav">
        <a href="admin.html">Дашборд</a>
        <a href="admin-orders.html">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html" class="active">Поддержка</a>
        <a href="admin-warehouse.html">Склад</a>
        <a href="admin-settings.html">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Техподдержка</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card grid-two">
        <div>
          <div class="filters">
            <input id="support-filter-text" placeholder="Клиент/тема" />
            <input id="support-filter-status" placeholder="Статус" />
            <button class="btn-secondary" id="support-refresh">Обновить</button>
          </div>
          <div id="support-thread-list" class="chat-list"></div>
        </div>
        <div>
          <div id="support-thread-header" style="margin-bottom:8px;color:#99a2be;">Выберите обращение</div>
          <div id="support-messages" class="chat-messages"></div>
          <form id="support-reply-form">
            <textarea id="support-reply-text" rows="3" placeholder="Ответ клиенту"></textarea>
            <div class="actions" style="margin-top:8px;">
              <button class="btn-primary" type="submit">Отправить</button>
              <button class="btn-secondary" type="button" id="support-close-thread">Закрыть чат</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin-support.js"></script>
</body>
</html>
