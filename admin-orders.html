<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ заказы</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">3Д Печать</div>
      <nav class="admin-nav">
        <a href="admin.html">Дашборд</a>
        <a href="admin-orders.html" class="active">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html">Поддержка</a>
        <a href="admin-warehouse.html">Склад</a>
        <a href="admin-settings.html">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Заказы</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card">
        <div class="filters">
          <input id="filter-order-text" placeholder="Номер/клиент/услуга" />
          <input id="filter-order-status" placeholder="Статус" />
          <input id="filter-order-date" type="date" />
          <button class="btn-secondary" id="refresh-orders">Обновить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>№</th>
                <th>Клиент</th>
                <th>Услуга</th>
                <th>Файл</th>
                <th>Статус</th>
                <th>Сумма</th>
                <th>Дата</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin-orders.js"></script>
</body>
</html>
