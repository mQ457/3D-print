<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ склад</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">3Д Печать</div>
      <nav class="admin-nav">
        <a href="admin.html">Дашборд</a>
        <a href="admin-orders.html">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html">Поддержка</a>
        <a href="admin-warehouse.html" class="active">Склад</a>
        <a href="admin-settings.html">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Склад</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card">
        <div class="filters">
          <input id="warehouse-search" placeholder="Поиск по технологии/материалу/цвету/толщине" />
          <button class="btn-secondary" id="warehouse-refresh">Обновить</button>
          <button class="btn-primary" id="warehouse-add">Добавить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Группа</th>
                <th>Технология</th>
                <th>Материал</th>
                <th>Вариантов</th>
                <th>Остаток (сумма)</th>
                <th>Индикатор</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody id="warehouse-body"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-card" style="margin-top:12px;">
        <div class="filters">
          <input id="warehouse-accounting-search" placeholder="Поиск по ID/технологии/материалу" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Технология</th>
                <th>Материал</th>
                <th>Цвет</th>
                <th>Толщина</th>
                <th>Остаток</th>
                <th>Резерв</th>
                <th>Потрачено</th>
                <th>Доступно</th>
                <th>Ед.</th>
                <th>Индикатор</th>
              </tr>
            </thead>
            <tbody id="warehouse-accounting-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="warehouse-modal" class="admin-modal" hidden>
    <div class="admin-modal__backdrop" data-close-warehouse-modal></div>
    <div class="admin-modal__card">
      <h3 style="margin-top:0;">Добавить позицию на склад</h3>
      <form id="warehouse-modal-form" class="grid-two">
        <label class="field"><span class="muted-small">Технология</span><input name="technologyCode" required placeholder="fdm" /></label>
        <label class="field"><span class="muted-small">Материал</span><input name="materialCode" required placeholder="pla" /></label>
        <label class="field"><span class="muted-small">Цвет</span><input name="colorCode" required placeholder="green" /></label>
        <label class="field"><span class="muted-small">Толщина (мм)</span><input name="thicknessMm" type="number" step="0.1" required value="0.2" /></label>
        <label class="field"><span class="muted-small">Количество</span><input name="stockQty" type="number" step="0.01" required value="1000" /></label>
        <label class="field"><span class="muted-small">Ед.</span><input name="unit" required value="g" /></label>
        <label class="field"><span class="muted-small">Цена за см3</span><input name="pricePerCm3" type="number" required value="40" /></label>
      </form>
      <div class="actions" style="margin-top:12px;">
        <button class="btn-secondary" type="button" data-close-warehouse-modal>Отмена</button>
        <button class="btn-primary" type="button" id="warehouse-modal-submit">Добавить</button>
      </div>
    </div>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin-warehouse.js"></script>
</body>
</html>
