<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ склад</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">3Д Печать</div>
      <nav class="admin-nav">
        <a href="admin.html">Дашборд</a>
        <a href="admin-orders.html">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html">Поддержка</a>
        <a href="admin-warehouse.html" class="active">Склад</a>
        <a href="admin-settings.html">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Склад (остатки и SKU)</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card">
        <div class="filters">
          <select id="warehouse-type">
            <option value="">Все типы</option>
            <option value="material_variant">Материалы (варианты)</option>
            <option value="technology">Технологии</option>
          </select>
          <input id="warehouse-search" placeholder="Поиск по названию/коду/материалу" />
          <button class="btn-secondary" id="warehouse-refresh">Обновить</button>
          <button class="btn-primary" id="warehouse-add">Добавить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Тип</th>
                <th>Код</th>
                <th>Название</th>
                <th>Технология</th>
                <th>Материал</th>
                <th>Цвет</th>
                <th>Толщина</th>
                <th>Остаток</th>
                <th>Резерв</th>
                <th>Потрачено</th>
                <th>Доступно</th>
                <th>Ед.</th>
                <th>Цена за см3</th>
                <th>Порог low</th>
                <th>Порог stop</th>
                <th>Индикатор</th>
                <th>Активно</th>
                <th>Порядок</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody id="warehouse-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin-warehouse.js"></script>
</body>
</html>
