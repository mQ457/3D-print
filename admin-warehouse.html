<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ склад</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">3Д Печать</div>
      <nav class="admin-nav">
        <a href="admin.html">Дашборд</a>
        <a href="admin-orders.html">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html">Поддержка</a>
        <a href="admin-warehouse.html" class="active">Склад</a>
        <a href="admin-settings.html">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Склад</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card">
        <div class="filters">
          <input id="warehouse-tech-search" placeholder="Поиск технологии" />
          <button class="btn-secondary" id="warehouse-refresh">Обновить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Код</th>
                <th>Название</th>
                <th>Сохранить</th>
                <th>Удалить</th>
              </tr>
            </thead>
            <tbody id="warehouse-tech-body"></tbody>
          </table>
        </div>
        <div class="grid-two" style="margin-top:12px;">
          <label class="field"><span class="muted-small">Код технологии</span><input id="warehouse-tech-code" placeholder="fdm" /></label>
          <label class="field"><span class="muted-small">Название технологии</span><input id="warehouse-tech-name" placeholder="FDM / FFF" /></label>
        </div>
        <div class="actions" style="margin-top:10px;">
          <button class="btn-primary" id="warehouse-tech-add">Добавить технологию</button>
        </div>
      </section>

      <section class="admin-card" style="margin-top:12px;">
        <div class="filters">
          <input id="warehouse-material-search" placeholder="Поиск материала" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Код</th>
                <th>Название</th>
                <th>Цена за см3</th>
                <th>Остаток</th>
                <th>Ед.</th>
                <th>Индикатор</th>
                <th>Сохранить</th>
                <th>Удалить</th>
              </tr>
            </thead>
            <tbody id="warehouse-material-body"></tbody>
          </table>
        </div>
        <div class="grid-two" style="margin-top:12px;">
          <label class="field"><span class="muted-small">Код материала</span><input id="warehouse-material-code" placeholder="pla" /></label>
          <label class="field"><span class="muted-small">Название материала</span><input id="warehouse-material-name" placeholder="PLA" /></label>
        </div>
        <div class="actions" style="margin-top:10px;">
          <button class="btn-primary" id="warehouse-material-add">Добавить материал</button>
        </div>
      </section>

    </main>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin-warehouse.js"></script>
</body>
</html>
