<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3Д печать</title>
    <link rel="stylesheet" href="./site.css" />
  </head>
  <body>
    <div class="container">
      <div class="app-shell">
        <input type="checkbox" id="nav-toggle" style="position:absolute;left:-9999px;" />
        <label class="app-burger" for="nav-toggle" aria-label="Открыть меню">☰</label>

        <aside class="sidebar" aria-label="Меню">
          <div class="side-brand">3Д Печать</div>
          <nav class="nav">
            <a class="nav-item is-active" href="profile.html"><span class="nav-ic"><img src="image/Frame_1_710.png" alt="setting"></span>Профиль</a>
            <a class="nav-item" href="orders.html"><span class="nav-ic"><img src="image/Frame_1_716.png" alt="setting"></span>Мои заказы</a>
            <a class="nav-item" href="delivery-address.html"><span class="nav-ic"><img src="image/Frame_1_727.png" alt="setting"></span>Адрес доставки</a>
            <a class="nav-item" href="payment.html"><span class="nav-ic"><img src="image/Frame_1_794.png" alt="setting"></span>Оплата</a>
          </nav>

          <div class="side-bottom">
            <div class="side-user">
              <div>
                <div class="name" id="sidebar-name">Пользователь</div>
                <div class="role">клиент</div>
              </div>
            </div>
            <button id="logout-btn" class="side-exit" type="button" style="background:none;border:none;">
              <span class="exit-ic" aria-hidden="true"><img src="image/Frame_1_965.png" alt="exit"></span>
              Выход
            </button>
          </div>
        </aside>

        <div class="app-content">
          <div class="app-top">
            <div>
              <h1 class="app-title">Настройки профиля</h1>
              <p class="app-sub">Управляйте личной информацией своего аккаунта</p>
            </div>
            <div class="breadcrumb"><span class="arrow-icon"><img class="" src="image/Frame_1_748.png" alt="exit"></span><a href="landing.html">Главная</a></div>
          </div>

          <div class="profile-grid">
            <section class="card profile-card">
              <div class="topline">
                <span class="icon" aria-hidden="true"><img src="image/Frame_1_878.png" alt="setting"></span>
                <h3 style="margin:0;">Личные данные</h3>
              </div>

              <form id="profile-form">
                <div class="profile-form" style="grid-template-columns:1fr;">
                  <label class="field" style="gap:6px;">
                    <span class="label" style="font-size:12px; margin:0;">ФИО</span>
                    <input class="input" type="text" name="fullName" placeholder="Введите ФИО" />
                  </label>
                </div>

                <div class="two-cols">
                  <label class="field" style="gap:6px;">
                    <span class="label" style="font-size:12px; margin:0;">Номер телефона</span>
                    <input class="input" type="tel" name="phone" readonly />
                  </label>
                  <label class="field" style="gap:6px;">
                    <span class="label" style="font-size:12px; margin:0;">Почта</span>
                    <input class="input" type="email" name="email" placeholder="name@email.com" />
                  </label>
                </div>

                <div class="profile-actions" style="margin-top: 14px;">
                  <button class="btn btn-primary" type="submit" style="padding:10px 18px;">Сохранить данные</button>
                </div>
                <div id="profile-status" class="muted-small" style="margin-top:10px;" aria-live="polite"></div>
              </form>
            </section>
            <section class="card profile-card" style="margin-top:16px;">
              <div class="topline">
                <span class="icon" aria-hidden="true"><img src="image/Frame_1_753.png" alt="setting"></span>
                <h3 style="margin:0;">Техподдержка</h3>
              </div>
              <form id="support-form" style="margin-top:12px;">
                <label class="field" style="gap:6px;">
                  <span class="label" style="font-size:12px; margin:0;">Тема</span>
                  <input class="input" type="text" name="subject" placeholder="Например: вопрос по заказу #A-001" />
                </label>
                <label class="field" style="gap:6px; margin-top:10px;">
                  <span class="label" style="font-size:12px; margin:0;">Ваш вопрос</span>
                  <textarea class="input" name="message" rows="4" placeholder="Опишите вопрос для поддержки"></textarea>
                </label>
                <div class="profile-actions" style="margin-top: 14px;">
                  <button class="btn btn-primary" type="submit" style="padding:10px 18px;">Отправить</button>
                </div>
                <div id="support-status" class="muted-small" style="margin-top:10px;" aria-live="polite"></div>
              </form>
              <div id="support-threads" style="margin-top:12px;"></div>
              <div id="support-chat" style="margin-top:10px;display:none;">
                <div id="support-chat-title" class="muted-small" style="margin-bottom:8px;"></div>
                <div id="support-messages" style="max-height:180px;overflow:auto;border:1px solid #e8eaf2;border-radius:10px;padding:8px;"></div>
                <form id="support-reply-form" style="margin-top:8px;">
                  <textarea class="input" name="message" rows="3" placeholder="Напишите ответ в чат"></textarea>
                  <button class="btn btn-ghost" type="submit" style="margin-top:8px;">Отправить в чат</button>
                </form>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
    <script src="delet_landing_page.js"></script>
    <script src="./scripts/app-bootstrap.js"></script>
    <script src="./scripts/order-notifications.js"></script>
    <script src="./scripts/profile.js"></script>
  </body>
</html>
