<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3Д печать</title>
    <link rel="icon" type="image/png" href="image/3D print(1).png">
    <link rel="stylesheet" href="./site.css" />
  </head>
  <body>
    <div class="container">
      <div class="app-shell">
        <input type="checkbox" id="nav-toggle" style="position:absolute;left:-9999px;" />
        <label class="app-burger" for="nav-toggle" aria-label="Открыть меню">☰</label>

        <aside class="sidebar" aria-label="Меню">
          <div class="side-brand">3Д Печать</div>
          <nav class="nav">
            <a class="nav-item" href="profile.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_770.png" alt="setting"></span>
              Профиль
            </a>
            <a class="nav-item" href="orders.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_716.png" alt="setting"></span>
              Мои заказы
            </a>
            <a class="nav-item" href="delivery-address.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_727.png" alt="setting"></span>
              Адрес доставки
            </a>
            <a class="nav-item is-active" href="payment.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_1080.png" alt="setting"></span>
              Оплата
            </a>
          </nav>

          <div class="side-bottom">
            <div class="side-user">
              <div>
                <div class="name"></div>
                <div class="role">клиент</div>
              </div>
              
            </div>
            <button id="logout-btn" class="side-exit" type="button" style="background:none;border:none;">
              <span class="exit-ic" aria-hidden="true"><img src="image/Frame_1_965.png" alt="exit"></span>
              Выход
            </button>
          </div>
        </aside>

        <div class="app-content">
          <div class="app-top">
            <div>
              <h1 class="app-title">Оплата заказов</h1>
              <p class="app-sub">Выберите или привяжите карту</p>
            </div>
            <div class="breadcrumb"><span class="arrow-icon"><img class="" src="image/Frame_1_748.png" alt="exit"></span><a href="landing.html">Главная</a></div>
          </div>

          <div class="pay-grid">
            <section class="card pay-top">
              <div class="pay-cards" aria-label="Карты" id="payment-cards">
                <div class="bank-card new-card" id="new-card-trigger">
                  +<br />
                  Привязать карту
                </div>
              </div>
              <form id="add-card-form" style="margin-top:12px;display:none;">
                <div class="two-cols">
                  <label class="field">
                    <span class="label">Номер карты</span>
                    <input class="input" type="text" name="cardNumber" inputmode="numeric" autocomplete="cc-number" maxlength="19" placeholder="0000 0000 0000 0000" />
                  </label>
                  <label class="field">
                    <span class="label">Владелец</span>
                    <input class="input" type="text" name="holderName" placeholder="IVAN IVANOV" />
                  </label>
                </div>
                <div class="two-cols" style="margin-top:8px;">
                  <label class="field">
                    <span class="label">Месяц</span>
                    <input class="input" type="text" name="expMonth" inputmode="numeric" maxlength="2" placeholder="MM" />
                  </label>
                  <label class="field">
                    <span class="label">Год</span>
                    <input class="input" type="text" name="expYear" inputmode="numeric" maxlength="4" placeholder="YYYY" />
                  </label>
                </div>
                <button class="btn btn-primary" type="submit" style="margin-top:8px;">Сохранить карту</button>
                <div id="payment-status" class="muted-small" style="margin-top:8px;"></div>
              </form>
            </section>

            <section class="card pay-list">
              <div class="pay-list-top">
                <div>Ожидают оплаты</div>
                <a href="#" class="muted-small" style="font-weight:1000;text-decoration:none; color:var(--accent2);">Все заказы &gt;</a>
              </div>

              <div id="payment-orders"></div>
            </section>
          </div>
        </div>
      </div>
    </div>
    <script src="scripts/app-bootstrap.js"></script>
    <script src="scripts/order-notifications.js"></script>
    <script src="scripts/payment.js"></script>
  </body>
</html>
