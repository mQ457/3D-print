<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ панель</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="admin-login" class="admin-card admin-login">
    <h1 style="margin-top:0;">Вход администратора</h1>
    <p style="color:#99a2be;">Используйте admin-аккаунт (телефон и пароль).</p>
    <form id="admin-login-form">
      <div style="display:grid;gap:8px;">
        <input name="phone" type="tel" inputmode="numeric" maxlength="16" placeholder="+79991234567" required />
        <input name="password" type="password" placeholder="Пароль" required />
        <button class="btn-primary" type="submit">Войти</button>
      </div>
      <div id="admin-login-status" style="margin-top:8px;color:#99a2be;"></div>
    </form>
  </div>

  <div id="admin-app" class="admin-shell" style="display:none;">
    <aside class="admin-sidebar">
      <div class="admin-brand">3D ADMIN</div>
      <nav class="admin-nav">
        <a href="admin.html" class="active">Дашборд</a>
        <a href="admin-orders.html">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html">Поддержка</a>
        <a href="admin-warehouse.html">Склад</a>
        <a href="admin-settings.html">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Дашборд</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card">
        <div class="row" id="dashboard-stats"></div>
      </section>
      <section class="admin-card" style="margin-top:10px;">
        <div class="actions" style="margin-bottom:10px;">
          <button class="btn-secondary" id="refresh-dashboard">Обновить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>№</th>
                <th>Клиент</th>
                <th>Услуга</th>
                <th>Статус</th>
                <th>Сумма</th>
                <th>Дата</th>
              </tr>
            </thead>
            <tbody id="dashboard-orders"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin.js"></script>
</body>
</html>
