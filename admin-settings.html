<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ настройки услуг</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">3Д Печать</div>
      <nav class="admin-nav">
        <a href="admin.html">Дашборд</a>
        <a href="admin-orders.html">Заказы</a>
        <a href="admin-clients.html">Клиенты</a>
        <a href="admin-support.html">Поддержка</a>
        <a href="admin-warehouse.html">Склад</a>
        <a href="admin-settings.html" class="active">Настройки услуг</a>
        <a href="admin-notifications.html">Уведомления</a>
        <a href="admin-reviews.html">Отзывы</a>
      </nav>
      <button class="admin-btn" data-admin-logout style="margin-top:12px;">Выйти</button>
    </aside>
    <main class="admin-main">
      <div class="admin-top">
        <h2 style="margin:0;">Настройки услуг</h2>
        <div data-admin-name></div>
      </div>
      <section class="admin-card">
        <div class="actions" style="margin-bottom:10px;">
          <button class="btn-secondary" id="settings-refresh">Обновить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Услуга</th>
                <th>База</th>
                <th>Минимум</th>
                <th>Ставка/час</th>
                <th>Setup</th>
                <th>% потерь</th>
                <th>% поддержек</th>
                <th>Станок/час</th>
                <th>Объем по умолч.</th>
                <th>Сохранить</th>
              </tr>
            </thead>
            <tbody id="settings-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="scripts/admin-common.js"></script>
  <script src="scripts/admin-settings.js"></script>
</body>
</html>
