<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3Д печать</title>
  <link rel="icon" type="image/png" href="image/3D print(1).png">
  <link rel="stylesheet" href="./site.css" />
      <style>
        /* Переопределяем только для этой страницы */
        body.hide-scrollbar {
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        body.hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="hide-scrollbar">
  <div id="overflow-container">
    <div class="container">
      <div class="app-shell">
        <input type="checkbox" id="nav-toggle" style="position:absolute;left:-9999px;" />
        <label class="app-burger" for="nav-toggle" aria-label="Открыть меню">☰</label>

        <aside class="sidebar" aria-label="Меню">
          <div class="side-brand">3Д Печать</div>

          <nav class="nav">
            <a class="nav-item" href="profile.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_770.png" alt="setting"></span>
              Профиль
            </a>
            <a class="nav-item" href="orders.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_716.png" alt="setting"></span>
              Мои заказы
            </a>
            <a class="nav-item is-active" href="delivery-address.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_989.png" alt="setting"></span>
              Адрес доставки
            </a>
            <a class="nav-item" href="payment.html">
              <span class="nav-ic" aria-hidden="true"><img src="image/Frame_1_794.png" alt="setting"></span>
              Оплата
            </a>
          </nav>

          <div class="side-bottom">
            <div class="side-user">
              <div>
                <div class="name">
          
                </div>
                <div class="role">клиент</div>
              </div>
            </div>
            <button id="logout-btn" class="side-exit" type="button" style="background:none;border:none;">
              <span class="exit-ic" aria-hidden="true"><img src="image/Frame_1_965.png" alt="exit"></span>
              Выход
            </button>
          </div>
        </aside>

        <div class="app-content">
          <div class="app-top">
            <div>
              <h1 class="app-title">Адрес доставки</h1>
              <p class="app-sub">Выберите пункт доставки, в который мы доставим готовое изделие</p>
            </div>
            <div class="breadcrumb"><span class="arrow-icon"><img class="" src="image/Frame_1_748.png" alt="exit"></span><a href="landing.html">Главная</a></div>
          </div>

          <div class="addr-grid">
            <section class="card search-box">
              <div class="label" style="margin:0 0 10px;">Поиск пункта выдачи</div>
              <div class="search-row">
                <input class="input" type="text" name="city" value="Москва" id="address-city" />
                <button class="btn btn-primary" type="button" id="address-search-btn">Найти</button>
              </div>
            </section>

            <section class="card map-card">
              <div class="label" style="margin:0;">Карта пунктов доставки</div>
              <div class="muted-small" style="margin-top:6px;">Выберите удобный пункт доставки на карте</div>
              <div class="map-placeholder delivery-map" id="delivery-map" style="margin-top:14px;">
                <div class="delivery-map-fallback">Загрузка карты...</div>
              </div>
              <label class="field" style="margin-top:12px;">
                <span class="label">Адрес</span>
                <input class="input" id="address-line" type="text" placeholder="Введите адрес доставки" />
              </label>
              <div class="save-row">
                <button class="btn btn-primary" type="button"
                  style="padding:8px 14px;border-radius:10px;" id="save-address-btn">Сохранить</button>
              </div>
              <div id="address-status" class="muted-small" style="margin-top:8px;"></div>
            </section>

            <section class="card saved-row">
              <div class="label" style="margin:0 0 4px;">Сохраненные адреса</div>
              <div class="saved-chips" id="saved-addresses">
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="delet_landing_page.js"></script>
  <script src="scripts/app-bootstrap.js"></script>
  <script src="scripts/order-notifications.js"></script>
  <script src="https://api-maps.yandex.ru/2.1/?apikey=61cf37c4-df8d-4a26-a335-bb193237e231&lang=ru_RU"></script>
  <script src="scripts/delivery-address.js"></script>
</body>
</html>
